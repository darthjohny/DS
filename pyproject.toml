[tool.ruff]
target-version = "py313"
line-length = 100
src = ["src", "tests", "analysis"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.13"
mypy_path = "src:."
files = ["src", "tests", "analysis"]
pretty = true
show_error_codes = true
warn_unused_configs = true
ignore_missing_imports = true
exclude = "(^experiments/|^notebooks/)"

[tool.pytest.ini_options]
markers = [
    "db_integration: DB-backed интеграционные тесты на временной схеме Postgres",
]
